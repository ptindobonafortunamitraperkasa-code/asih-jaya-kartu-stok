<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Data Barang</title>
  <style>
    body { font-family: Arial; padding:20px; }
    table { border-collapse: collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:8px; text-align:left; }
    th { background:#eee; }
    button { padding:6px 10px; cursor:pointer; }
  </style>
</head>
<body>

<h2>Import Data Barang</h2>

<input type="file" id="import_barang_file">
<button onclick="importBarangCSV()">Import CSV</button>

<table id="data_barang_table">
  <thead>
    <tr>
      <th>Kode</th>
      <th>Nama Barang</th>
      <th>Gudang</th>
      <th>Lokasi</th>
      <th>Letak</th>
      <th>Stok Awal</th>
      <th>Stok Saat Ini</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

// IMPORT CSV
async function importBarangCSV() {
  const file = document.getElementById('import_barang_file').files[0];
  if (!file) return alert('Pilih file dulu');

  const text = await file.text();
  const lines = text.split(/\r?\n/).filter(x => x.trim());

  const delimiter = lines[0].includes(';') ? ';' : ',';

  let data = [];

  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(delimiter);

    data.push({
      id: crypto.randomUUID(),
      kode: cols[0]?.trim() || '',
      nama_barang: cols[1]?.trim() || '',
      gudang: cols[2]?.trim() || '',
      lokasi: cols[3]?.trim() || '',
      letak: cols[4]?.trim() || '',
      stok_awal: Number(cols[5] || 0),
      stok_saat_ini: Number(cols[5] || 0)
    });
  }

  localStorage.setItem('data_barang', JSON.stringify(data));

  tampilkanDataBarang();
  alert('Import berhasil');
}

// TAMPILKAN DATA
function tampilkanDataBarang() {
  const tbody = document.querySelector('#data_barang_table tbody');
  const data = JSON.parse(localStorage.getItem('data_barang') || '[]');

  tbody.innerHTML = '';

  data.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.kode}</td>
        <td>${item.nama_barang}</td>
        <td>${item.gudang}</td>
        <td>${item.lokasi}</td>
        <td>${item.letak}</td>
        <td>${item.stok_awal}</td>
        <td>${item.stok_saat_ini}</td>
      </tr>
    `;
  });
}

// LOAD SAAT BUKA
document.addEventListener('DOMContentLoaded', tampilkanDataBarang);

</script>

</body>
</html>
