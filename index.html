<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartu Stok Fix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Kartu Stok (FIX EDIT)</h2>

<input id="nama" placeholder="Nama Barang"><br>
<input id="gudang" placeholder="Gudang"><br>
<input id="lokasi" placeholder="Lokasi"><br>
<input id="letak" placeholder="Letak"><br><br>

<button onclick="loadData()">Load Data</button>

<div id="data"></div>

<script>

// ===== GANTI INI =====
const SUPABASE_URL = 'https://dvpyetgzpkmfqbjboihz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cHlldGd6cGttZnFiamJvaWh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzk4MDEsImV4cCI6MjA5MDg1NTgwMX0.FNKl_4SjPrfyHHyN3RNoRXVKAL2_1VUCtRGMh7LjQwU';
// =====================

const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let productsData = [];
let editingId = null;

// ===== LOAD DATA =====
async function loadData() {
  const { data } = await client.from('products').select('*');
  productsData = data || [];

  let html = "<table border='1'><tr><th>Nama</th><th>Aksi</th></tr>";

  productsData.forEach(item => {
    html += `
      <tr>
        <td>${item.nama_barang}</td>
        <td>
          <button onclick="editBarang('${item.id}')">Edit</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";
  document.getElementById("data").innerHTML = html;
}

// ===== FIX EDIT =====
function editBarang(id) {
  const item = productsData.find(x => x.id == id);

  if (!item) {
    alert("Data tidak ditemukan");
    return;
  }

  editingId = id;

  document.getElementById('nama').value = item.nama_barang || '';
  document.getElementById('gudang').value = item.gudang || '';
  document.getElementById('lokasi').value = item.lokasi || '';
  document.getElementById('letak').value = item.letak_barang || '';

  alert("Edit aktif");
}

</script>

</body>
</html>
