
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Stok</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }
.card { background:white; padding:20px; margin:20px; border-radius:10px; }
.btn { padding:10px 15px; background:#2563eb; color:white; border:none; border-radius:6px; cursor:pointer; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="card" id="loginCard">
<h2>Login</h2>
<input id="login_email" placeholder="email"><br><br>
<input id="login_password" type="password" placeholder="password"><br><br>
<button class="btn" onclick="loginUser()">Login</button>
</div>

<div id="appArea" class="hidden card">
<h2>Dashboard</h2>

<input type="file" id="import_barang_file">
<button class="btn" onclick="importBarangCSV()">Import CSV</button>

<br><br>
<button class="btn" onclick="logoutUser()">Logout</button>
</div>

<script>

// ================= SUPABASE =================
const SUPABASE_URL = 'https://dvpyetgzpkmfqbjboihz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2cHlldGd6cGttZnFiamJvaWh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzk4MDEsImV4cCI6MjA5MDg1NTgwMX0.FNKl_4SjPrfyHHyN3RNoRXVKAL2_1VUCtRGMh7LjQwU';
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================= LOGIN =================
async function loginUser() {
  const email = document.getElementById('login_email').value;
  const password = document.getElementById('login_password').value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    alert('Login gagal: ' + error.message);
    return;
  }

  alert('Login berhasil');
  cekSession();
}

// ================= LOGOUT =================
async function logoutUser() {
  await client.auth.signOut();
  document.getElementById('loginCard').classList.remove('hidden');
  document.getElementById('appArea').classList.add('hidden');
}

// ================= CEK SESSION =================
async function cekSession() {
  const { data } = await client.auth.getUser();

  if (!data.user) {
    document.getElementById('loginCard').classList.remove('hidden');
    document.getElementById('appArea').classList.add('hidden');
    return;
  }

  document.getElementById('loginCard').classList.add('hidden');
  document.getElementById('appArea').classList.remove('hidden');
}

// ================= IMPORT CSV (FIX TOTAL) =================
async function importBarangCSV() {
  try {
    const file = document.getElementById('import_barang_file').files[0];

    if (!file) {
      alert('Pilih file dulu');
      return;
    }

    const text = await file.text();
    const lines = text.split('\n').filter(x => x.trim());

    if (lines.length < 2) {
      alert('File kosong');
      return;
    }

    const delimiter = lines[0].includes(';') ? ';' : ',';

    const dataInsert = [];

    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(delimiter);

      if (!cols[0] || !cols[1]) continue;

      dataInsert.push({
        kode_barang: cols[0],
        nama_barang: cols[1],
        barcode: cols[2] || '',
        stok_awal: Number(cols[3] || 0),
        gudang: cols[4] || '',
        lokasi: cols[5] || '',
        letak_barang: cols[6] || '',
        stok_minimum: Number(cols[7] || 0),
        status: 'aktif'
      });
    }

    if (!dataInsert.length) {
      alert('Tidak ada data valid');
      return;
    }

    const { error } = await client.from('products').insert(dataInsert);

    if (error) {
      alert('Gagal: ' + error.message);
      return;
    }

    alert('Import berhasil');

  } catch (err) {
    alert('Error: ' + err.message);
  }
}

// ================= INIT =================
window.addEventListener('load', cekSession);

</script>

</body>
</html>
